<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian | Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="admin-dashboard-body">
    
    <nav class="admin-top-nav">
        <div class="admin-brand">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-indigo-600"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            <span class="gradient-text font-bold">Guardian Console</span>
        </div>
        <div style="display:flex; gap: 1rem; align-items:center;">
             <!-- Theme Toggle Button -->
             <button id="themeToggle" class="theme-toggle-btn" style="background:var(--bg-alt); color:var(--text-main);" aria-label="Toggle Dark Mode">
                <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            <button id="logoutBtn" class="btn-outline">Terminate Session</button>
        </div>
    </nav>

    <div class="admin-wrapper fade-in">
        <header class="admin-banner floating-card mb-8">
            <div>
                <h1 class="text-3xl font-bold text-white">Command Center</h1>
                <p class="text-indigo-100 mt-2">Manage global resources and oversee active incident reports.</p>
            </div>
            <div class="badge glass-badge pulse-soft" style="align-self: flex-start; color: white; border-color: rgba(255,255,255,0.3);">
                <span class="status-dot bg-emerald-400"></span> Live Telemetry Active
            </div>
        </header>

        <div class="grid two mb-8">
            <div class="card outline-card hover-up">
                <div class="card-title-row">
                    <h3>Deploy Resource</h3>
                    <span class="badge premium-badge">Content Node</span>
                </div>
                <div class="input-group">
                    <label>Resource Title</label>
                    <input type="text" id="resourceTitle" placeholder="e.g., Cyber Security Protocol">
                </div>
                <div class="grid two mt-4">
                    <div class="input-group">
                        <label>Category</label>
                        <input type="text" id="resourceCategory" placeholder="Tag">
                    </div>
                    <div class="input-group">
                        <label>Target URL</label>
                        <input type="text" id="resourceLink" placeholder="https://...">
                    </div>
                </div>
                <div class="input-group mt-4">
                    <label>Abstract</label>
                    <textarea id="resourceDescription" rows="3" placeholder="Brief description of the document..."></textarea>
                </div>
                <button id="addResourceBtn" class="btn-primary mt-5 full">Inject to Database</button>
                <div id="resourceResult" class="result hidden mt-3"></div>
            </div>

            <div class="card outline-card resource-list-card">
                <div class="card-title-row mb-4 border-b pb-4">
                    <h3>Active Resources</h3>
                    <span class="badge premium-badge" style="background: var(--info-bg); color: var(--info);">Live Sync</span>
                </div>
                <div id="adminResourceList" class="scrollable-feed"></div>
            </div>
        </div>

        <div class="card outline-card mb-12">
            <div class="admin-section-header border-b pb-5 mb-5">
                <div>
                    <h3>Incident Telemetry</h3>
                    <p class="text-sm muted mt-1">Review and process submitted security vectors.</p>
                </div>
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="reportSearchInput" placeholder="Filter by target, vector, or status...">
                </div>
            </div>
            <div id="adminReportList" class="report-grid"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='admin.js') }}"></script>
</body>
</html>
